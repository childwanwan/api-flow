spring:
  application:
    name: api-flow-test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:api_flow;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.flow.infrastructure.persistence.mybatis.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
